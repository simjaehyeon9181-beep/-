<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모바일 주민등록증</title>
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        /* 실제 모바일 신분증 느낌의 카드 스타일 */
        .id-card {
            background: linear-gradient(135deg, #e0f2fe, #fbcfe8);
            width: 320px;
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            box-sizing: border-box;
        }
        .card-title {
            font-size: 19px;
            font-weight: bold;
            color: #334155;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        /* 이미지 영역 스타일 */
        .photo-area {
            width: 140px;
            height: 175px;
            background-color: #e2e8f0;
            margin: 0 auto 25px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 텍스트 정보 영역 */
        .info-area {
            color: #1e293b;
            margin-bottom: 30px;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .resident-number {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 18px;
            color: #334155;
        }
        .address {
            font-size: 14px;
            color: #475569;
            line-height: 1.5;
            word-break: keep-all;
        }
        /* 하단 발급 기관 */
        .footer-area {
            font-size: 17px;
            font-weight: bold;
            color: #475569;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            padding-top: 18px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="id-card">
        <div class="card-title">주민등록증</div>
        
        <div class="photo-area">
            <!-- 깃허브 저장소에 사진(profile.jpg)을 올리면 연동됩니다 -->
            <img src="profile.jpg" alt="증명사진">
        </div>
        
        <div class="info-area">
            <div class="name">심 재 현</div>
            <div class="resident-number">070506-3196015</div>
            <div class="address">인천광역시 부평구 부흥로<br>243번길 39</div>
        </div>
        
        <div class="footer-area">
            행 정 안 전 부
        </div>
    </div>

</body>
</html>
